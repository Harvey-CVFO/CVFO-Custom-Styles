name: Sync EliteRT Team Data

on:
  schedule:
    # Runs daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cheerio (HTML parser)
        run: npm install cheerio

      - name: Fetch and parse EliteRT team data
        run: node .github/scripts/parse-elitert.js

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add team-ppt.json team-ast.json team-vfo.json
          git diff --staged --quiet || git commit -m "chore: sync EliteRT team data [skip ci]"
          git push
